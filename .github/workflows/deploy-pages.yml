# ============================================================
# GitHub Actions — Build & Deploy to GitHub Pages
# ============================================================
# Triggers on push to main and allows manual dispatch.
# Builds the Vite frontend and deploys the static output
# to GitHub Pages.
#
# SETUP REQUIRED:
#   1. Go to repo Settings > Pages > Source: "GitHub Actions"
#   2. (Optional) Set repository variable VITE_BASE_PATH if
#      deploying to a subpath (e.g., /FDD_Engagement_Pipeline/)
#   3. (Optional) Set repository variable API_BASE_URL to
#      the backend server URL (e.g., https://your-backend.fly.dev)
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject API base URL
        run: |
          # If API_BASE_URL is set, inject it into index.html
          # so the frontend knows where to send API requests
          if [ -n "${{ vars.API_BASE_URL }}" ]; then
            sed -i "s|window.__API_BASE_URL__ || ''|window.__API_BASE_URL__ || '${{ vars.API_BASE_URL }}'|" index.html
            echo "✅ API_BASE_URL set to: ${{ vars.API_BASE_URL }}"
          else
            echo "ℹ️  No API_BASE_URL configured — API calls will be relative"
          fi

      - name: Build static site
        run: pnpm build
        env:
          # Set base path for GitHub Pages (defaults to /<repo-name>/)
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}

      - name: Copy static assets to dist
        run: |
          # Copy public assets (logo, etc.) into the build output
          cp -r public/* dist/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
